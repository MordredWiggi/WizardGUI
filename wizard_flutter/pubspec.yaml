name: wizard_flutter
description: Wizard card game score tracker – Android Flutter port.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # State management
  provider: ^6.1.2

  # Local persistence
  shared_preferences: ^2.3.2
  path_provider: ^2.1.4

  # Chart for score progression (Layer 2)
  fl_chart: ^0.69.0

  # Date formatting
  intl: ^0.19.0

  # SHA-256 hashing for game deduplication
  crypto: ^3.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
